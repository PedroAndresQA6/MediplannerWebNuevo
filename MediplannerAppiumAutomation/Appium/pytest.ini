[pytest]
markers =
    smoke: flujo crítico, debe correr en cada validación de build
    slow: test que normalmente toma más de 30s (agendar/reprogramar citas, alta de medicamento, etc.)
    destructivo: modifica o borra datos del paciente de prueba (usar con cuidado en el ambiente compartido)

# Backstop ante un colgado real de Appium/emulador (aparte del crash_monitor, que
# detecta crash/ANR pero no un test que nunca retorna). Requiere pytest-timeout.
timeout = 180

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(message)s
log_cli_date_format = %H:%M:%S
